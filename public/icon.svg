<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Rounded Card Background -->
  <rect width="180" height="180" rx="42" fill="#090D16" />
  <rect x="1" y="1" width="178" height="178" rx="41" stroke="url(#grad)" stroke-width="2.5" stroke-opacity="0.8" />
  
  <!-- Logo Emblem: Glowing waves forming V and a desk ticket -->
  <g transform="translate(15, 15)" filter="url(#neon-glow)">
    <!-- Back Glow Effect -->
    <path d="M40 50 L75 110 L110 50" stroke="url(#glow-grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" />
    <!-- Main V Line Left -->
    <path d="M40 50 L75 110" stroke="url(#grad)" stroke-width="14" stroke-linecap="round" />
    <!-- Main V Line Right -->
    <path d="M75 110 L110 50" stroke="url(#grad)" stroke-width="14" stroke-linecap="round" />
    
    <!-- Desk support overlapping tickets/chat rings -->
    <path d="M45 75 C60 65, 90 65, 105 75" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none" />
    <path d="M55 90 C65 85, 85 85, 95 90" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" fill="none" />
  </g>
</svg>